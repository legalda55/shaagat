<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" dir="rtl">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#0038B8" stroke="#fff" stroke-width="4"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Roaring Lion silhouette - stylized -->
  <g transform="translate(200,170)" fill="#fff">
    <!-- Lion head -->
    <ellipse cx="0" cy="-20" rx="55" ry="50" fill="#fff" opacity="0.95"/>
    <!-- Mane - flowing lines -->
    <path d="M-55,-20 Q-75,-60 -50,-80 Q-30,-90 -10,-75" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <path d="M-50,-50 Q-70,-80 -40,-95 Q-15,-105 10,-85" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <path d="M-40,-60 Q-55,-90 -25,-100 Q5,-108 25,-85" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <path d="M55,-20 Q75,-60 50,-80 Q30,-90 10,-75" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <path d="M50,-50 Q70,-80 40,-95 Q15,-105 -10,-85" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <path d="M40,-60 Q55,-90 25,-100 Q-5,-108 -25,-85" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-30" r="6" fill="#0038B8"/>
    <circle cx="18" cy="-30" r="6" fill="#0038B8"/>
    <circle cx="-16" cy="-31" r="2" fill="#fff"/>
    <circle cx="20" cy="-31" r="2" fill="#fff"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-15" rx="8" ry="5" fill="#0038B8" opacity="0.6"/>
    <!-- Open mouth - roaring -->
    <path d="M-25,0 Q-15,25 0,30 Q15,25 25,0" fill="#c62828" opacity="0.8"/>
    <path d="M-20,2 L-15,12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <path d="M20,2 L15,12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <!-- Body suggestion -->
    <path d="M-40,20 Q-60,60 -45,90 L45,90 Q60,60 40,20" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Coins - ₪ symbols around the lion -->
  <g font-family="Arial,sans-serif" font-weight="700" fill="#FFD700">
    <!-- Coin 1 - top left -->
    <circle cx="75" cy="100" r="22" fill="#FFD700" opacity="0.9"/>
    <circle cx="75" cy="100" r="18" fill="none" stroke="#DAA520" stroke-width="2"/>
    <text x="75" y="106" text-anchor="middle" font-size="18" fill="#8B6914">₪</text>

    <!-- Coin 2 - top right -->
    <circle cx="325" cy="100" r="22" fill="#FFD700" opacity="0.9"/>
    <circle cx="325" cy="100" r="18" fill="none" stroke="#DAA520" stroke-width="2"/>
    <text x="325" y="106" text-anchor="middle" font-size="18" fill="#8B6914">₪</text>

    <!-- Coin 3 - bottom left -->
    <circle cx="85" cy="310" r="20" fill="#FFD700" opacity="0.85"/>
    <circle cx="85" cy="310" r="16" fill="none" stroke="#DAA520" stroke-width="2"/>
    <text x="85" y="316" text-anchor="middle" font-size="16" fill="#8B6914">₪</text>

    <!-- Coin 4 - bottom right -->
    <circle cx="315" cy="310" r="20" fill="#FFD700" opacity="0.85"/>
    <circle cx="315" cy="310" r="16" fill="none" stroke="#DAA520" stroke-width="2"/>
    <text x="315" y="316" text-anchor="middle" font-size="16" fill="#8B6914">₪</text>
  </g>

  <!-- Text: שאגת הארי -->
  <text x="200" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="28" fill="#fff" letter-spacing="2">שאגת הארי</text>

  <!-- Text: 2026 -->
  <text x="200" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="18" fill="rgba(255,255,255,0.7)">2026</text>

  <!-- Small Star of David at top -->
  <g transform="translate(200,45)" fill="none" stroke="#fff" stroke-width="2" opacity="0.8">
    <polygon points="0,-14 12,7 -12,7"/>
    <polygon points="0,14 12,-7 -12,-7"/>
  </g>
</svg>
